<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1400" role="img" aria-label="Nature's Way Soil Living Soil Revitalizer back pouch"><rect width="1200" height="1400" fill="#f8f8f5"/><path d="M120 60h960c45 0 80 35 80 80v1120c0 55-45 100-100 100H140c-55 0-100-45-100-100V140c0-45 35-80 80-80z" fill="#c99d62"/><rect x="155" y="230" width="890" height="560" rx="20" fill="#fffdf2"/><rect x="155" y="230" width="890" height="135" rx="20" fill="#06391f"/><circle cx="250" cy="300" r="55" fill="#0c4a2a" stroke="#c6a036" stroke-width="4"/><text x="600" y="295" font-family="Georgia, serif" font-size="42" font-weight="700" fill="#ffffff" text-anchor="middle">NATURE’S WAY SOIL</text><text x="600" y="350" font-family="Georgia, serif" font-size="48" fill="#ffffff" text-anchor="middle">Living Soil Revitalizer</text><rect x="360" y="370" width="480" height="40" rx="18" fill="#0c4a2a" stroke="#fffdf2" stroke-width="2"/><text x="600" y="398" font-family="Arial, sans-serif" font-size="22" font-weight="900" fill="#fffdf2" text-anchor="middle" letter-spacing="3">WORM CASTINGS + ACTIVATED BIOCHAR</text><text x="250" y="475" font-family="Arial, sans-serif" font-size="26" font-weight="900" fill="#06391f">1  PRODUCT DESCRIPTION</text><text x="300" y="520" font-family="Arial, sans-serif" font-size="20" fill="#111">Concentrated dry soil amendment made to help refresh tired soil in</text><text x="300" y="550" font-family="Arial, sans-serif" font-size="20" fill="#111">gardens, raised beds, containers, and potted plants.</text><line x1="250" y1="590" x2="950" y2="590" stroke="#c6a036" stroke-width="3"/><text x="250" y="640" font-family="Arial, sans-serif" font-size="26" font-weight="900" fill="#06391f">2  INGREDIENTS</text><text x="300" y="685" font-family="Arial, sans-serif" font-size="20" fill="#111">Worm castings, activated biochar, compost, kelp, humic acid,</text><text x="300" y="715" font-family="Arial, sans-serif" font-size="20" fill="#111">fulvic acid, and BM-1 beneficial biology.</text><line x1="250" y1="755" x2="950" y2="755" stroke="#c6a036" stroke-width="3"/><text x="250" y="805" font-family="Arial, sans-serif" font-size="26" font-weight="900" fill="#06391f">3  DIRECTIONS FOR USE</text><text x="300" y="850" font-family="Arial, sans-serif" font-size="20" fill="#111">Containers: mix 1/4 to 1/2 cup into top layer of soil.</text><text x="300" y="880" font-family="Arial, sans-serif" font-size="20" fill="#111">Raised beds: apply 1 to 2 cups per 100 square feet.</text><text x="300" y="910" font-family="Arial, sans-serif" font-size="20" fill="#111">Transplanting: add 1 to 2 tablespoons into planting hole.</text><text x="300" y="940" font-family="Arial, sans-serif" font-size="20" fill="#111">Top dress every 3 to 4 weeks during active growth.</text><line x1="250" y1="980" x2="950" y2="980" stroke="#c6a036" stroke-width="3"/><text x="250" y="1030" font-family="Arial, sans-serif" font-size="26" font-weight="900" fill="#06391f">4  STORAGE &amp; CAUTION</text><text x="300" y="1075" font-family="Arial, sans-serif" font-size="20" fill="#111">Store in a cool, dry place. Reseal bag after use.</text><text x="300" y="1105" font-family="Arial, sans-serif" font-size="20" fill="#111">Keep out of reach of children and pets. Avoid breathing dust.</text><text x="195" y="1205" font-family="Arial, sans-serif" font-size="22" fill="#111">Net Wt. 4 lb (.81 kg)</text><text x="600" y="1205" font-family="Arial, sans-serif" font-size="22" fill="#111" text-anchor="middle">Nature’s Way Soil &amp; Vermicompost LLC</text><text x="930" y="1205" font-family="Arial, sans-serif" font-size="22" fill="#111" text-anchor="middle">natureswaysoil.com</text><rect x="210" y="800" width="780" height="360" fill="#151515" opacity=".83"/><path d="M140 1160 C340 1240, 860 1240, 1060 1160 L1060 1285 C840 1365, 360 1365, 140 1285 Z" fill="#c99d62"/></svg>