<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" role="img" aria-label="Nature's Way Soil Hay Pasture and Lawn Recovery System 2.5 gallon back box"><rect width="1200" height="1200" fill="#f8f8f5"/><rect x="70" y="105" width="1060" height="935" rx="18" fill="#c99d62"/><text x="900" y="255" font-family="Arial, sans-serif" font-size="76" font-weight="900" fill="#171717" text-anchor="middle">2.5 GAL./10L</text><rect x="135" y="380" width="930" height="575" rx="8" fill="#fffdf2"/><rect x="135" y="380" width="930" height="130" rx="8" fill="#06391f"/><text x="295" y="445" font-family="Georgia, serif" font-size="36" font-weight="700" fill="#fffdf2" text-anchor="middle">Hay, Pasture &amp;</text><text x="295" y="488" font-family="Georgia, serif" font-size="36" font-weight="700" fill="#fffdf2" text-anchor="middle">Lawn Recovery System</text><text x="600" y="470" font-family="Georgia, serif" font-size="42" font-weight="700" fill="#fffdf2" text-anchor="middle">NATURE'S WAY SOIL</text><text x="875" y="450" font-family="Georgia, serif" font-size="26" fill="#fffdf2" text-anchor="middle">Concentrated soil-support formula</text><text x="875" y="485" font-family="Georgia, serif" font-size="26" fill="#fffdf2" text-anchor="middle">for hay fields, pastures, lawns,</text><text x="875" y="520" font-family="Georgia, serif" font-size="26" fill="#fffdf2" text-anchor="middle">turf, and food plots.</text><rect x="160" y="535" width="280" height="185" fill="#f7f5ea" stroke="#06391f" stroke-width="3"/><text x="300" y="570" font-family="Arial, sans-serif" font-size="22" font-weight="900" fill="#06391f" text-anchor="middle">PRODUCT DESCRIPTION</text><text x="180" y="610" font-family="Arial, sans-serif" font-size="18" fill="#111">Concentrated soil-support formula</text><text x="180" y="638" font-family="Arial, sans-serif" font-size="18" fill="#111">designed to help improve stressed</text><text x="180" y="666" font-family="Arial, sans-serif" font-size="18" fill="#111">soil and grass performance during</text><text x="180" y="694" font-family="Arial, sans-serif" font-size="18" fill="#111">heat, drought and seasonal stress.</text><rect x="460" y="535" width="300" height="385" fill="#f7f5ea" stroke="#06391f" stroke-width="3"/><text x="610" y="570" font-family="Arial, sans-serif" font-size="22" font-weight="900" fill="#06391f" text-anchor="middle">DIRECTIONS FOR USE</text><text x="485" y="615" font-family="Arial, sans-serif" font-size="18" fill="#111">Shake well before each use.</text><text x="485" y="645" font-family="Arial, sans-serif" font-size="18" fill="#111">Dilute with water before applying.</text><text x="485" y="690" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#06391f">Hay Fields &amp; Pasture</text><text x="485" y="720" font-family="Arial, sans-serif" font-size="18" fill="#111">Apply 1–2 quarts per acre.</text><text x="485" y="765" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#06391f">Lawns &amp; Turf</text><text x="485" y="795" font-family="Arial, sans-serif" font-size="18" fill="#111">Apply 2–6 oz per 1,000 sq ft.</text><text x="485" y="840" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#06391f">General Soil Drench</text><text x="485" y="870" font-family="Arial, sans-serif" font-size="18" fill="#111">Mix 2–4 oz per gallon of water.</text><rect x="780" y="535" width="260" height="140" fill="#f7f5ea" stroke="#06391f" stroke-width="3"/><text x="910" y="570" font-family="Arial, sans-serif" font-size="22" font-weight="900" fill="#06391f" text-anchor="middle">BEST RESULTS</text><text x="800" y="610" font-family="Arial, sans-serif" font-size="17" fill="#111">Apply during cool part of day.</text><text x="800" y="638" font-family="Arial, sans-serif" font-size="17" fill="#111">Water in lightly when practical.</text><rect x="780" y="690" width="260" height="75" fill="#f7f5ea" stroke="#06391f" stroke-width="3"/><text x="910" y="725" font-family="Arial, sans-serif" font-size="22" font-weight="900" fill="#06391f" text-anchor="middle">COVERAGE</text><text x="800" y="752" font-family="Arial, sans-serif" font-size="17" fill="#111">2.5 gallons covers up to 2–5 acres.</text><rect x="780" y="780" width="260" height="140" fill="#f7f5ea" stroke="#06391f" stroke-width="3"/><text x="910" y="815" font-family="Arial, sans-serif" font-size="22" font-weight="900" fill="#06391f" text-anchor="middle">CAUTION / SAFETY</text><text x="800" y="855" font-family="Arial, sans-serif" font-size="17" fill="#111">Keep out of reach of children.</text><text x="800" y="883" font-family="Arial, sans-serif" font-size="17" fill="#111">Avoid eye and prolonged skin contact.</text><rect x="135" y="955" width="930" height="80" fill="#06391f"/><text x="600" y="1005" font-family="Georgia, serif" font-size="36" font-weight="700" fill="#fffdf2" text-anchor="middle">Nature’s Way Soil</text><text x="600" y="1034" font-family="Arial, sans-serif" font-size="22" fill="#c6a036" text-anchor="middle">Soil Recovery • Water Retention • Root Support • Stress Recovery</text></svg>