name: Deploy to Vercel (Preview)

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

concurrency:
  group: vercel-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build-and-preview:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm run type-check

      - name: Run production build checks
        run: npm run build

      - name: Detect forked pull request
        id: fork_check
        run: |
          if [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
            echo "is_fork=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_fork=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip preview deploy for forks
        if: steps.fork_check.outputs.is_fork == 'true'
        run: |
          {
            echo "## Preview Deployment Status"
            echo ""
            echo "⚠️ Preview deployment skipped for forked PRs because repository secrets are unavailable."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Pull Vercel environment information
        if: steps.fork_check.outputs.is_fork == 'false'
        run: npx vercel@latest pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Vercel preview artifacts
        if: steps.fork_check.outputs.is_fork == 'false'
        run: npx vercel@latest build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy preview to Vercel
        if: steps.fork_check.outputs.is_fork == 'false'
        id: deploy
        run: |
          url=$(npx vercel@latest deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Preview deployment completed: $url"

      - name: Publish deployment summary
        if: steps.fork_check.outputs.is_fork == 'false'
        run: |
          {
            echo "## Preview Deployment Status"
            echo ""
            echo "✅ Preview deployment succeeded"
            echo ""
            echo "**URL:** ${{ steps.deploy.outputs.url }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment preview URL on pull request
        if: steps.fork_check.outputs.is_fork == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- vercel-preview-url -->';
            const body = `${marker}\n✅ Vercel preview deployed: ${{ steps.deploy.outputs.url }}`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) => comment.body && comment.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
