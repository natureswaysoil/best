name: Auto-Generate Blog Content

on:
  schedule:
    # Run every 2 days at 9 AM UTC
    - cron: '0 9 */2 * *'

  # Allow manual triggering from the GitHub Actions tab
  workflow_dispatch:
    inputs:
      force_generate:
        description: 'Force content generation regardless of schedule'
        required: false
        default: false
        type: boolean

concurrency:
  group: auto-generate-blog-content
  cancel-in-progress: false

jobs:
  generate-content:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      FORCE_GENERATE: ${{ github.event.inputs.force_generate }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify required secrets
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY is not configured in repository secrets."
            echo "Add it under Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action - Blog Generator"

      - name: Generate blog content
        run: |
          if [ "$FORCE_GENERATE" = "true" ]; then
            echo "🚀 Force generating content..."
          else
            echo "📅 Running scheduled content generation..."
          fi
          npm run blog:auto

      - name: Check for changes
        id: verify-changed-files
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changes=true" >> $GITHUB_OUTPUT
            git status --short
          else
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          fi

      - name: Build and verify before committing
        if: steps.verify-changed-files.outputs.changes == 'true'
        run: |
          npm run build
          echo "✅ Site built successfully with new content"

      - name: Commit and push changes
        if: steps.verify-changed-files.outputs.changes == 'true'
        run: |
          git add data/blog.ts
          git commit -m "auto: generate blog content - $(date '+%Y-%m-%d')"
          git push

      - name: Post-generation summary
        if: steps.verify-changed-files.outputs.changes == 'true'
        run: |
          echo "📝 Blog Content Generation Complete!"
          echo "New articles have been generated and committed."
          echo "The site should deploy with the new content."
          if [ -f "auto-blog-generation.log" ]; then
            echo "📋 Latest generation log:"
            tail -10 auto-blog-generation.log
          fi
